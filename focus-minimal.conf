# Subtle focus: arrows plus a compact pane label.
setw -g pane-border-status top
setw -g pane-border-lines single
setw -g pane-border-indicators arrows
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_sky}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-format "#{?pane_active,#[fg=#{@thm_sky},bold] ▶ #P ,#[fg=#{@thm_overlay_0}] #P }"

set -g window-style "fg=#{@thm_subtext_1},bg=#{@thm_bg}"
set -g window-active-style "fg=#{@thm_fg},bg=#{@thm_bg}"

set -g display-panes-time 1200
set -g display-panes-active-colour cyan
set -g display-panes-colour colour244
set -g @focus_preset "minimal"
