# Strongest focus: bold red active badge and a truncated current path.
setw -g pane-border-status top
setw -g pane-border-lines heavy
setw -g pane-border-indicators both
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_red}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_2}"
setw -g pane-border-format "#{?pane_active,#[bg=#{@thm_red},fg=#{@thm_crust}] ACTIVE #[bg=#{@thm_surface_2},fg=#{@thm_fg}] #P #[bg=#{@thm_bg},fg=#{@thm_yellow}] #{=/-36/...:#{b:pane_current_path}} ,#[fg=#{@thm_overlay_0}] #P #{pane_current_command} }"

set -g window-style "fg=#{@thm_overlay_0},bg=#{@thm_crust}"
set -g window-active-style "fg=#{@thm_fg},bg=#{@thm_bg}"

set -g display-panes-time 1600
set -g display-panes-active-colour red
set -g display-panes-colour colour244
set -g @focus_preset "loud"
