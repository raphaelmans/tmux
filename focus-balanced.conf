# Clear focus: heavy border, arrows, and an active badge with the command.
setw -g pane-border-status top
setw -g pane-border-lines heavy
setw -g pane-border-indicators both
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_green}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_1}"
setw -g pane-border-format "#{?pane_active,#[bg=#{@thm_green},fg=#{@thm_crust}] ACTIVE #[bg=#{@thm_surface_2},fg=#{@thm_fg}] #P #[bg=#{@thm_bg},fg=#{@thm_subtext_0}] #{pane_current_command} ,#[fg=#{@thm_overlay_0}] #P #{pane_current_command} }"

set -g window-style "fg=#{@thm_overlay_1},bg=#{@thm_mantle}"
set -g window-active-style "fg=#{@thm_fg},bg=#{@thm_bg}"

set -g display-panes-time 1200
set -g display-panes-active-colour yellow
set -g display-panes-colour colour244
set -g @focus_preset "balanced"
